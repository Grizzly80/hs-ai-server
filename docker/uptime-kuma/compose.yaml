services:
  uptime-kuma:
    image: louislam/uptime-kuma:2.3.2
    container_name: uptime-kuma
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
    ports:
      - "${UPTIME_KUMA_PORT:-3001}:3001"
    volumes:
      - /srv/data/uptime-kuma:/app/data
    healthcheck:
      test: ["CMD", "extra/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
