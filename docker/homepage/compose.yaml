services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.4.6
    container_name: homepage
    restart: unless-stopped
    environment:
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS:?set HOMEPAGE_ALLOWED_HOSTS in .env}
    ports:
      - "127.0.0.1:${HOMEPAGE_PORT:-3000}:3000"
    volumes:
      - /srv/data/homepage/config:/app/config
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
