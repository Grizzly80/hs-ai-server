services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:1.99.1
    container_name: n8n
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Seoul}
      GENERIC_TIMEZONE: ${TZ:-Asia/Seoul}
      N8N_HOST: ${N8N_HOST:?set N8N_HOST in .env}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      WEBHOOK_URL: ${WEBHOOK_URL:?set WEBHOOK_URL in .env}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?set N8N_ENCRYPTION_KEY in .env}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-true}
    ports:
      - "127.0.0.1:${N8N_PORT:-5678}:5678"
    volumes:
      - /srv/data/n8n:/home/node/.n8n
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
